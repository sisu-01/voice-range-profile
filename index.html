<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 음역창 측정기 (VRP)</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin: 0 0 5px 0; color: #00ff64; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button {
            background: #2ea44f; color: white; border: none; 
            padding: 12px 24px; font-size: 1rem; font-weight: bold; 
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        #clearBtn { background: #d73a49; }
        #canvasContainer {
            position: relative; width: 100%; max-width: 650px; 
            aspect-ratio: 4/3; background: #000; 
            border: 2px solid #333; border-radius: 8px; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #info { margin-top: 12px; font-size: 0.95rem; color: #aaa; text-align: center; height: 1.5em; }
    </style>
</head>
<body>

    <h1>Voice Range Profile (VRP)</h1>
    <div class="controls">
        <button id="startBtn">측정 시작 (마이크 켜기)</button>
        <button id="clearBtn">그리드 초기화</button>
    </div>

    <div id="canvasContainer">
        <canvas id="vrpCanvas"></canvas>
    </div>

    <div id="info">측정 시작 버튼을 누르고 마이크 권한을 허용해 주세요.</div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const canvas = document.getElementById('vrpCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        // 음역 및 성량 기준 설정 (X축: C2~C6, Y축: 40dB~100dB)
        const MIN_NOTE = 36; // C2
        const MAX_NOTE = 84; // C6
        const NOTE_RANGE = MAX_NOTE - MIN_NOTE;
        const MIN_DB = 40;
        const MAX_DB = 100;
        const DB_RANGE = MAX_DB - MIN_DB;

        // 방문한 위치를 기록할 해시 맵 (Key: "노트번호_데시벨")
        let vrpGrid = {}; 

        let audioContext, analyser, dataArray;
        let isRunning = false;
        let currentPitch = -1, currentDb = -1;

        // 피아노 계음 이름 매핑용
        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function getNoteName(midiNote) {
            const octave = Math.floor(midiNote / 12) - 1;
            return NOTE_NAMES[midiNote % 12] + octave;
        }

        // 모바일 해상도 대응 캔버스 리사이징
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            render();
        }
        window.addEventListener('resize', resizeCanvas);

        // 마이크 시작 버튼 이벤트
        startBtn.addEventListener('click', async () => {
            if (isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; // 피치 검출 정밀도 리소스
                dataArray = new Float32Array(analyser.fftSize);
                source.connect(analyser);
                
                isRunning = true;
                startBtn.style.display = 'none';
                info.textContent = "아~ 하고 소리를 내보세요!";
                resizeCanvas();
                updateLoop();
            } catch (err) {
                alert('마이크 접근에 실패했습니다. HTTPS 연결 상태를 확인하세요: ' + err.message);
            }
        });

        clearBtn.addEventListener('click', () => { vrpGrid = {}; render(); });

        // 주파수 및 성량 추출 알고리즘 (Autocorrelation)
        function analyzeAudio(buffer, sampleRate) {
            const SIZE = buffer.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) { rms += buffer[i] * buffer[i]; }
            rms = Math.sqrt(rms / SIZE);
            
            if (rms < 0.008) return { pitch: -1, db: -Infinity }; // 너무 작은 소리 제외

            // 실시간 데시벨 계산 (마이크 특성에 맞춘 상용 보정값 +95 가미)
            let db = Math.round(20 * Math.log10(rms) + 95);
            db = Math.max(MIN_DB, Math.min(MAX_DB, db));

            // 기본 음고 검출용 자기상관 알고리즘
            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
            for (let i = SIZE - 1; i >= SIZE / 2; i--) { if (Math.abs(buffer[i]) < thres) { r2 = i; break; } }
            const buf = buffer.slice(r1, r2);
            const len = buf.length;

            let bestOffset = -1, bestCorrelation = 0;
            const maxSamples = Math.floor(len / 2);
            
            // 인간 목소리 유효 범위 탐색 (약 60Hz ~ 1200Hz 제한)
            const minOffset = Math.floor(sampleRate / 1200);
            const maxOffset = Math.min(maxSamples, Math.floor(sampleRate / 60));

            for (let offset = minOffset; offset < maxOffset; offset++) {
                let correlation = 0;
                for (let i = 0; i < maxSamples; i++) {
                    correlation += Math.abs(buf[i] - buf[i + offset]);
                }
                correlation = 1 - (correlation / maxSamples);
                if (correlation > bestCorrelation) {
                    bestCorrelation = correlation;
                    bestOffset = offset;
                }
            }

            if (bestCorrelation > 0.85) {
                return { pitch: sampleRate / bestOffset, db: db };
            }
            return { pitch: -1, db: db };
        }

        function updateLoop() {
            requestAnimationFrame(updateLoop);
            if (!isRunning) return;

            analyser.getFloatTimeDomainData(dataArray);
            const result = analyzeAudio(dataArray, audioContext.sampleRate);

            if (result.pitch !== -1) {
                // 주파수 -> MIDI Note 번호 공식 변환
                const midiNote = Math.round(12 * (Math.log(result.pitch / 440) / Math.log(2))) + 69;
                if (midiNote >= MIN_NOTE && midiNote <= MAX_NOTE) {
                    currentPitch = midiNote;
                    currentDb = result.db;

                    // 그리드 좌표 저장 키 활성화
                    vrpGrid[`${currentPitch}_${currentDb}`] = true;
                    info.textContent = `현재 상태: ${getNoteName(currentPitch)} (${Math.round(result.pitch)}Hz) / ${currentDb} dB`;
                }
            } else {
                currentPitch = -1; currentDb = -1;
            }
            render();
        }

        function render() {
            const W = canvas.width; const H = canvas.height;
            ctx.clearRect(0, 0, W, H);
            if (W === 0 || H === 0) return;

            const dpr = window.devicePixelRatio || 1;
            // 피아노 건반 영역 확보를 위해 하단 패딩을 40에서 75로 확장
            const padLeft = 55 * dpr; const padBottom = 75 * dpr;
            const paddingTop = 20 * dpr; const padRight = 20 * dpr;
            const graphW = W - padLeft - padRight; const graphH = H - paddingTop - padBottom;

            // 1. 그리드 레이아웃 및 텍스트 그리기
            ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 1 * dpr;
            ctx.fillStyle = '#888'; ctx.font = `${11 * dpr}px sans-serif`;
            ctx.textBaseline = 'middle'; ctx.textAlign = 'right';

            // Y축 (데시벨 격자선)
            for (let db = MIN_DB; db <= MAX_DB; db += 10) {
                const y = paddingTop + graphH - ((db - MIN_DB) / DB_RANGE) * graphH;
                ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
                ctx.fillText(`${db}dB`, padLeft - 8, y);
            }

            // X축 (피아노 주요 옥타브 가이드 실선만 먼저 드로잉)
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const x = padLeft + ((note - MIN_NOTE) / NOTE_RANGE) * graphW;
                if (note % 12 === 0) { 
                    ctx.strokeStyle = '#444';
                    ctx.beginPath(); ctx.moveTo(x, paddingTop); ctx.lineTo(x, paddingTop + graphH); ctx.stroke();
                }
            }

            // 2. 누적 데이터 페인팅 (초록 픽셀 블록)
            const cellW = graphW / NOTE_RANGE;
            const cellH = graphH / DB_RANGE;
            ctx.fillStyle = 'rgba(0, 255, 100, 0.75)';
            for (let key in vrpGrid) {
                const [note, db] = key.split('_').map(Number);
                const x = padLeft + (note - MIN_NOTE) * cellW;
                const y = paddingTop + graphH - (db - MIN_DB) * cellH;
                ctx.fillRect(x, y - cellH, cellW + 0.5, cellH + 0.5); 
            }

            // 3. 하단 피아노 건반 렌더링 시스템
            const pianoY = paddingTop + graphH + 8 * dpr; // 건반 시작 Y 좌표
            const pianoH = 30 * dpr;                       // 건반 전체 높이
            const blackKeys = [1, 3, 6, 8, 10];            // 흑건 단어 구조 배열 (C#=1, D#=3...)

            // [Pass 1] 백건(White Keys) 먼저 그리기
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const isBlack = blackKeys.includes(note % 12);
                if (!isBlack) {
                    const x = padLeft + (note - MIN_NOTE) * cellW;
                    
                    // 현재 소리내는 음이면 빨갛게 활성화, 아니면 흰색
                    ctx.fillStyle = (currentPitch === note) ? '#ff3333' : '#ffffff';
                    ctx.fillRect(x, pianoY, cellW, pianoH);
                    
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 1 * dpr;
                    ctx.strokeRect(x, pianoY, cellW, pianoH);
                }
            }

            // [Pass 2] 흑건(Black Keys) 위에 덮어 그리기
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const isBlack = blackKeys.includes(note % 12);
                if (isBlack) {
                    const x = padLeft + (note - MIN_NOTE) * cellW;
                    
                    // 현재 소리내는 음이면 연한 빨강, 아니면 검은색계열
                    ctx.fillStyle = (currentPitch === note) ? '#ff6666' : '#333333';
                    ctx.fillRect(x, pianoY, cellW, pianoH * 0.65); // 흑건은 통상 65% 높이
                    
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.strokeRect(x, pianoY, cellW, pianoH * 0.65);
                }
            }

            // [Pass 3] 건반 하단 옥타브 텍스트 라벨링 (C2, C3, C4...)
            ctx.fillStyle = '#888';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const x = padLeft + ((note - MIN_NOTE) / NOTE_RANGE) * graphW;
                if (note % 12 === 0) { 
                    ctx.fillText(getNoteName(note), x, pianoY + pianoH + 6 * dpr);
                }
            }

            // 4. 현재 실시간 보컬 위치 포인터 (빨간색 조준선)
            if (currentPitch !== -1 && currentDb !== -1) {
                const curX = padLeft + (currentPitch - MIN_NOTE) * cellW + cellW / 2;
                const curY = paddingTop + graphH - (currentDb - MIN_DB) * cellH - cellH / 2;

                ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2 * dpr;
                ctx.beginPath();
                ctx.moveTo(curX - 12, curY); ctx.lineTo(curX + 12, curY);
                ctx.moveTo(curX, curY - 12); ctx.lineTo(curX, curY + 12);
                ctx.stroke();
            }
        }

        // 첫 빈 그리드 셋업
        resizeCanvas();
    </script>
</body>
</html>
