<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 음역창 측정기 (VRP) - 고정밀 버전</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.4rem; margin: 0 0 5px 0; color: #00ff64; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button {
            background: #2ea44f; color: white; border: none; 
            padding: 12px 24px; font-size: 1rem; font-weight: bold; 
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        #clearBtn { background: #d73a49; }
        #canvasContainer {
            position: relative; width: 100%; max-width: 650px; 
            aspect-ratio: 4/3; background: #000; 
            border: 2px solid #333; border-radius: 8px; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #info { margin-top: 12px; font-size: 0.95rem; color: #aaa; text-align: center; height: 1.5em; }
    </style>
    <script src="https://unpkg.com/pitchy@4.0.0/dist/index.umd.js"></script>
</head>
<body>

    <h1>Voice Range Profile (VRP)</h1>
    <div class="controls">
        <button id="startBtn">측정 시작 (마이크 켜기)</button>
        <button id="clearBtn">그리드 초기화</button>
    </div>

    <div id="canvasContainer">
        <canvas id="vrpCanvas"></canvas>
    </div>

    <div id="info">측정 시작 버튼을 누르고 마이크 권한을 허용해 주세요.</div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const canvas = document.getElementById('vrpCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        // 축 기준 설정
        const MIN_NOTE = 36; // C2
        const MAX_NOTE = 84; // C6
        const NOTE_RANGE = MAX_NOTE - MIN_NOTE;
        const MIN_DB = 35;   
        const MAX_DB = 125;  
        const DB_RANGE = MAX_DB - MIN_DB;

        let vrpGrid = {}; 
        let audioContext, analyser, dataArray;
        let isRunning = false;
        let currentPitch = -1, currentDb = -1;

        const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function getNoteName(midiNote) {
            const octave = Math.floor(midiNote / 12) - 1;
            return NOTE_NAMES[midiNote % 12] + octave;
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            render();
        }
        window.addEventListener('resize', resizeCanvas);

        startBtn.addEventListener('click', async () => {
            if (isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; 
                dataArray = new Float32Array(analyser.fftSize);
                source.connect(analyser);
                
                isRunning = true;
                startBtn.style.display = 'none';
                info.textContent = "소리를 내보세요!";
                resizeCanvas();
                updateLoop();
            } catch (err) {
                alert('마이크 접근 실패: ' + err.message);
            }
        });

        clearBtn.addEventListener('click', () => { vrpGrid = {}; render(); });

        function updateLoop() {
            requestAnimationFrame(updateLoop);
            if (!isRunning) return;

            analyser.getFloatTimeDomainData(dataArray);
            
            // 1. 성량(dB) 계산
            let rms = 0;
            for (let i = 0; i < dataArray.length; i++) { rms += dataArray[i] * dataArray[i]; }
            rms = Math.sqrt(rms / dataArray.length);

            // 숨소리나 미세 소음 커트라인 강화
            if (rms < 0.01) {
                currentPitch = -1; currentDb = -1;
                render();
                return;
            }

            let db = Math.round(20 * Math.log10(rms) + 95);
            db = Math.max(MIN_DB, Math.min(MAX_DB, db));

            // 2. 🔥 Pitchy 라이브러리의 YIN 알고리즘으로 주파수 추출
            // 오차 확률(Clarity)이 0.85 이상인 완벽한 알맹이 소리만 필터링합니다.
            const detector = Pitchy.PitchDetector.forFloat32Array(analyser.fftSize);
            const [pitch, clarity] = detector.findPitch(dataArray, audioContext.sampleRate);

            if (pitch > 0 && clarity > 0.85) {
                const midiNote = Math.round(12 * (Math.log(pitch / 440) / Math.log(2))) + 69;
                
                // 남성 현실 음역대 바운더리 체크 (노이즈로 튀는 초고음 차단)
                if (midiNote >= MIN_NOTE && midiNote <= MAX_NOTE && pitch < 1200) {
                    currentPitch = midiNote;
                    currentDb = db;
                    vrpGrid[`${currentPitch}_${currentDb}`] = true;
                    info.textContent = `현재 상태: ${getNoteName(currentPitch)} (${Math.round(pitch)}Hz) / ${currentDb} dB (신뢰도: ${Math.round(clarity*100)}%)`;
                }
            } else {
                currentPitch = -1; currentDb = -1;
            }
            render();
        }

        function render() {
            const W = canvas.width; const H = canvas.height;
            ctx.clearRect(0, 0, W, H);
            if (W === 0 || H === 0) return;

            const dpr = window.devicePixelRatio || 1;
            const padLeft = 55 * dpr; const padBottom = 75 * dpr;
            const paddingTop = 20 * dpr; const padRight = 20 * dpr;
            const graphW = W - padLeft - padRight; const graphH = H - paddingTop - padBottom;

            ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 1 * dpr;
            ctx.fillStyle = '#888'; ctx.font = `${11 * dpr}px sans-serif`;
            ctx.textBaseline = 'middle'; ctx.textAlign = 'right';

            // Y축 (데시벨)
            for (let db = MIN_DB; db <= MAX_DB; db += 15) {
                const y = paddingTop + graphH - ((db - MIN_DB) / DB_RANGE) * graphH;
                ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
                ctx.fillText(`${db}dB`, padLeft - 8, y);
            }

            // X축 (가이드선)
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const x = padLeft + ((note - MIN_NOTE) / NOTE_RANGE) * graphW;
                if (note % 12 === 0) { 
                    ctx.strokeStyle = '#444';
                    ctx.beginPath(); ctx.moveTo(x, paddingTop); ctx.lineTo(x, paddingTop + graphH); ctx.stroke();
                }
            }

            // 데이터 블록
            const cellW = graphW / NOTE_RANGE;
            const cellH = graphH / DB_RANGE;
            ctx.fillStyle = 'rgba(0, 255, 100, 0.75)';
            for (let key in vrpGrid) {
                const [note, db] = key.split('_').map(Number);
                const x = padLeft + (note - MIN_NOTE) * cellW;
                const y = paddingTop + graphH - (db - MIN_DB) * cellH;
                ctx.fillRect(x, y - cellH, cellW + 0.5, cellH + 0.5); 
            }

            // 피아노 건반
            const pianoY = paddingTop + graphH + 8 * dpr; 
            const pianoH = 30 * dpr;                       
            const blackKeys = [1, 3, 6, 8, 10];            

            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                if (!blackKeys.includes(note % 12)) {
                    const x = padLeft + (note - MIN_NOTE) * cellW;
                    ctx.fillStyle = (currentPitch === note) ? '#ff3333' : '#ffffff';
                    ctx.fillRect(x, pianoY, cellW, pianoH);
                    ctx.strokeStyle = '#1a1a1a'; ctx.strokeRect(x, pianoY, cellW, pianoH);
                }
            }
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                if (blackKeys.includes(note % 12)) {
                    const x = padLeft + (note - MIN_NOTE) * cellW;
                    ctx.fillStyle = (currentPitch === note) ? '#ff6666' : '#333333';
                    ctx.fillRect(x, pianoY, cellW, pianoH * 0.65);
                    ctx.strokeStyle = '#1a1a1a'; ctx.strokeRect(x, pianoY, cellW, pianoH * 0.65);
                }
            }

            // 라벨링
            ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            for (let note = MIN_NOTE; note <= MAX_NOTE; note++) {
                const x = padLeft + ((note - MIN_NOTE) / NOTE_RANGE) * graphW;
                if (note % 12 === 0) { 
                    ctx.fillText(getNoteName(note), x, pianoY + pianoH + 6 * dpr);
                }
            }

            // 조준선
            if (currentPitch !== -1 && currentDb !== -1) {
                const curX = padLeft + (currentPitch - MIN_NOTE) * cellW + cellW / 2;
                const curY = paddingTop + graphH - (currentDb - MIN_DB) * cellH - cellH / 2;
                ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2 * dpr;
                ctx.beginPath();
                ctx.moveTo(curX - 12, curY); ctx.lineTo(curX + 12, curY);
                ctx.moveTo(curX, curY - 12); ctx.lineTo(curX, curY + 12);
                ctx.stroke();
            }
        }

        resizeCanvas();
    </script>
</body>
</html>
